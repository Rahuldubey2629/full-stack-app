
name: DevPulse CI/CD

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: ./devpulse/backend
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        working-directory: ./devpulse/backend
        run: |
          pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SYNC_DATABASE_URL: sqlite:///./test.db
          JWT_SECRET: test-secret-for-ci-only
          REDIS_URL: redis://localhost:6379/0
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: fake-key-for-tests

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image (local)
        run: |
          docker build -t devpulse-backend:${{ github.sha }} ./devpulse/backend

      - name: Configure AWS Credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/devpulse-backend:$IMAGE_TAG ./devpulse/backend
          docker tag $ECR_REGISTRY/devpulse-backend:$IMAGE_TAG $ECR_REGISTRY/devpulse-backend:latest
          docker push $ECR_REGISTRY/devpulse-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/devpulse-backend:latest
  
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Dependencies
        working-directory: ./devpulse/frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./devpulse/frontend
        run: npm run build

      - name: Build Frontend Docker Image (local)
        run: |
          docker build -t devpulse-frontend:${{ github.sha }} ./devpulse/frontend

      - name: Configure AWS Credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Frontend and Push Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/devpulse-frontend:$IMAGE_TAG ./devpulse/frontend
          docker tag $ECR_REGISTRY/devpulse-frontend:$IMAGE_TAG $ECR_REGISTRY/devpulse-frontend:latest
          docker push $ECR_REGISTRY/devpulse-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/devpulse-frontend:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      name: Checkout Code
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_INFRA }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_INFRA }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        mv kubectl /usr/local/bin/

    - name: Check if EKS cluster exists
      id: check-cluster
      run: |
        if aws eks describe-cluster \
            --name devpulse-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --query 'cluster.status' 2>/dev/null; then
            echo "cluster_exists=true" >> $GITHUB_OUTPUT
          else
            echo "cluster_exists=false" >> $GITHUB_OUTPUT
          fi

    - name: Update kubeconfig
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      run: |
        aws eks update-kubeconfig --name devpulse-cluster --region ${{ secrets.AWS_REGION }}
    
    - name: Install Helm
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    
    - name: Install NGINX Ingress Controller
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      run: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.7.0/deploy/static/provider/aws/deploy.yaml
        kubectl wait --namespace ingress-nginx \
          --for=condition=ready pod --selector=app.kubernetes.io/component=controller \
          --timeout=300s

    - name: Verify Ingress Controller
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      run: |
        kubectl get pods -n ingress-nginx
        kubectl get svc -n ingress-nginx


  
          
    # This were the original deployment steps, but they are commented out for now. And keeping them here for reference.
    # Now we will update this to use with Helm chart deployment instead of kubectl apply.

    - name: Apply k8s manifests
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/postgres/
        kubectl apply -f k8s/redis/
        kubectl -n devpulse rollout status deployment/postgres --timeout=300s

        kubectl -n devpulse delete job devpulse-migrate --ignore-not-found
        kubectl apply -f k8s/backend/migrate-job.yaml
        kubectl -n devpulse wait --for=condition=complete job/devpulse-migrate --timeout=300s
        kubectl -n devpulse logs job/devpulse-migrate

        kubectl apply -f k8s/backend/service.yaml
        kubectl apply -f k8s/backend/deployment.yaml
        kubectl apply -f k8s/worker/
        kubectl apply -f k8s/frontend/
        kubectl apply -f k8s/ingress.yaml

    - name: Update the image tags
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        kubectl set image deployment/devpulse-backend \
            devpulse-backend=$ECR_REGISTRY/devpulse-backend:$IMAGE_TAG \
            -n devpulse
        kubectl set image deployment/devpulse-worker \
            devpulse-worker=$ECR_REGISTRY/devpulse-backend:$IMAGE_TAG \
            -n devpulse
        kubectl set image deployment/devpulse-frontend \
            devpulse-frontend=$ECR_REGISTRY/devpulse-frontend:$IMAGE_TAG \
            -n devpulse

    - name: wait for rollout to complete
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      run: |
        kubectl rollout status deployment/devpulse-backend -n devpulse --timeout=300s
        kubectl rollout status deployment/devpulse-worker -n devpulse   --timeout=300s
        kubectl rollout status deployment/devpulse-frontend -n devpulse --timeout=300s
    
    - name: Verify Pods are Running
      if: steps.check-cluster.outputs.cluster_exists == 'true'
      run: |
        kubectl get pods -n devpulse
        kubectl get services -n devpulse
      


    - name: Skip Deployment - no cluster
      if: steps.check-cluster.outputs.cluster_exists == 'false'
      run: |
        echo "EKS cluster does not exist. Skipping deployment."
        echo "Start cluster with eks-startup workflow first."

       