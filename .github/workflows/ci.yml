
name: DevPulse CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Checkout Code
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Dependencies
      working-directory: ./devpulse/backend
      run: |
        pip install -r requirements.txt

    - name: Run Tests
      working-directory: ./devpulse/backend
      run: |
        pytest tests/ -v
      env: 
        DATABASE_URL: sqlite+aiosqlite:///./test.db
        SYNC_DATABASE_URL: sqlite:///./test.db
        JWT_SECRET: test-secret-for-ci-only
        REDIS_URL: redis://localhost:6379/0
        LLM_PROVIDER: gemini
        GEMINI_API_KEY: fake-key-for-tests

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
    - uses: actions/checkout@v4 
      name: Checkout Code

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws_region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2


    - name: Build and Push Backend  Image
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/devpulse-backend:$IMAGE_TAG ./devpulse/backend
        docker push $ECR_REGISTRY/devpulse-backend:$IMAGE_TAG
  
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      name: Checkout Code
    
    - name: Setup Node
      uses: actions/setup-node@v5
      with: 
        node-version: "20"
    
    - name : Install Dependencies
      working-directory: ./devpulse/frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./devpulse/frontend
      run: npm run build
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws_region: ${{ secrets.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Frontend and Push Image
      env: 
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
          docker build -t $ECR_REGISTRY/devpulse-frontend:$IMAGE_TAG ./devpulse/frontend
          docker push $ECR_REGISTRY/devpulse-frontend:$IMAGE_TAG


