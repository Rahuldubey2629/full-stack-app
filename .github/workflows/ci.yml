
name: DevPulse CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Checkout Code
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Dependencies
      working-directory: ./devpulse/backend
      run: |
        pip install -r requirements.txt

    - name: Run Tests
      working-directory: ./devpulse/backend
      run: |
        pytest tests/ -v
      env: 
        DATABASE_URL: sqlite+aiosqlite:///./test.db
        SYNC_DATABASE_URL: sqlite:///./test.db
        JWT_SECRET: test-secret-for-ci-only
        REDIS_URL: redis://localhost:6379/0
        LLM_PROVIDER: gemini
        GEMINI_API_KEY: fake-key-for-tests

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
    - uses: actions/checkout@v4 
      name: Checkout Code

    - name: Build Backend Docker Image
      working-directory: ./devpulse/backend
      run: |
        docker build -t devpulse-backend:${{ github.sha }} .
  
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      name: Checkout Code
    
    - name: Setup Node
      uses: actions/setup-node@v5
      with: 
        node-version: "20"
    
    - name : Install Dependencies
      working-directory: ./devpulse/frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./devpulse/frontend
      run: npm run build

