apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-frontend
  namespace: devpulse
  labels:
    app: devpulse-frontend
spec:
  replicas: 2
  strategy:          
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: devpulse-frontend
  template:
    metadata:
      labels:
        app: devpulse-frontend
    spec:
      containers:
        - name: devpulse-frontend
          image: 167535219723.dkr.ecr.ap-southeast-2.amazonaws.com/devpulse-frontend:v3
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:  
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
