apiVersion: batch/v1
kind: Job
metadata:
  name: devpulse-migrate
  namespace: devpulse
  labels:
    app: devpulse-migrate
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: devpulse-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: 167535219723.dkr.ecr.ap-southeast-2.amazonaws.com/devpulse-backend:latest
          imagePullPolicy: Always
          workingDir: /app
          command: ["sh", "-lc"]
          args:
            - |
              export PYTHONPATH=/app
              alembic upgrade head
          env:
            - name: APP_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:postgres@postgres-service:5432/devpulse"
            - name: SYNC_DATABASE_URL
              value: "postgresql+psycopg2://postgres:postgres@postgres-service:5432/devpulse"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: JWT_SECRET
              value: "change-me-in-production"
