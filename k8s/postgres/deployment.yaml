apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: devpulse
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:  
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata/db
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m" 
          volumeMounts:
            - name: devpulse-pvc
              mountPath: /var/lib/postgresql/data/pgdata/data
              
      volumes:
        - name: devpulse-pvc
          persistentVolumeClaim:
            claimName: devpulse-pvc