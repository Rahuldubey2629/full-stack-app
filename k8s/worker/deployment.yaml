apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-worker
  namespace: devpulse
  labels:
    app: devpulse-worker
spec:
  replicas: 2
  strategy:           
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: devpulse-worker
  template:
    metadata:
      labels: 
        app: devpulse-worker
    spec:
      containers:
        - name: devpulse-worker
          image: 167535219723.dkr.ecr.ap-southeast-2.amazonaws.com/devpulse-backend:latest
          imagePullPolicy: Always
          command: ["celery"]
          args: ["-A", "app.workers.tasks", "worker", "--loglevel=info"]
          env:
            - name: APP_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:postgres@postgres-service:5432/devpulse"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: JWT_SECRET
              value: "change-me-in-production"
            - name: LLM_PROVIDER
              value: "gemini"
            - name: GEMINI_API_KEY
              value: "Change-me-in-production"
            - name: SYNC_DATABASE_URL
              value: "postgresql+psycopg2://postgres:postgres@postgres-service:5432/devpulse"
            - name: CORS_ORIGINS
              value: "*"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m" 
          livenessProbe:
            exec: 
              command:
                - celery
                - -A
                - app.workers.tasks
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3