apiVersion: v1
kind: Service
metadata: 
  name: frontend-service
  namespace: {{ .Values.namespace }}
  labels:
    app: devpulse-frontend
spec:
  selector:
    app: devpulse-frontend
  ports:
    - protocol: TCP
      port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
  type: ClusterIP