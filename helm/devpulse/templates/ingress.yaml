apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devpulse-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    # # nginx.ingress.kubernetes.io/rewrite-target: /
    # nginx.ingress.kubernetes.io/ssl-redirect: "false" # Set to "true" if you have TLS configured
    # # nginx.ingress.kubernetes.io/ingress.class: "nginx"
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m" # Adjust as needed for file uploads
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "300" # Adjust as needed for long-running requests
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "300" # Adjust as needed for long-running requests

    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}

spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /incidents
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /retro
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number:  {{ .Values.backend.servicePort }}
          - path: /runbooks
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: {{ .Values.frontend.port }}
