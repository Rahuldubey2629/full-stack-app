# backend deployment configuration for devpulse application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: devpulse-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:           
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: devpulse-backend
  template:
    metadata:
      labels:
        app: devpulse-backend
    spec:
      containers:
        - name: devpulse-backend
          image: {{ .Values.registry }}/{{ .Values.backend.image }}:{{ .Values.backend.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: APP_ENV
              value: {{ .Values.app.env }}
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.secrets.dbUser }}:{{ .Values.secrets.dbPassword }}@postgres-service:{{ .Values.postgres.port }}/{{ .Values.secrets.dbName }}"
            - name: REDIS_URL
              value: "redis://redis-service:{{ .Values.redis.port }}/0"
            - name: JWT_SECRET
              value: {{ .Values.secrets.jwtSecret | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.app.llmProvider | quote }}
            - name: AzURE_OPENAI_API_KEY
              value: {{ .Values.secrets.azureOpenAIKey | quote }}
            - name: AZURE_OPENAI_ENDPOINT
              value: {{ .Values.secrets.azureOpenAIEndpoint | quote }}
            - name: AZURE_OPENAI_DEPLOYMENT_NAME
              value: {{ .Values.secrets.azureOpenAIDeploymentName | quote }}
            - name: AZURE_OPENAI_API_VERSION
              value: {{ .Values.secrets.azureOpenAIAPIVersion | quote }}
            - name: AZURE_OPENAI_MODEL
              value: {{ .Values.secrets.azureOpenAIModel | quote }}
            - name: SYNC_DATABASE_URL
              value: "postgresql+psycopg2://{{ .Values.secrets.dbUser }}:{{ .Values.secrets.dbPassword }}@postgres-service:{{ .Values.postgres.port }}/{{ .Values.secrets.dbName }}"
            - name: CORS_ORIGINS
              value: "*"
          # Liveness Probe is the app is alive and running
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          # Readiness Probe is the app is ready to receive traffic
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu }}
              memory: {{ .Values.backend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu }}
              memory: {{ .Values.backend.resources.limits.memory }}

