apiVersion: batch/v1
kind: Job
metadata:
  name: devpulse-migrate
  namespace: {{ .Values.namespace }}
  labels:
    app: devpulse-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-create
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: devpulse-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ .Values.registry }}/{{ .Values.backend.image }}:{{ .Values.backend.tag }}
          imagePullPolicy: Always
          workingDir: /app
          command: ["sh", "-lc"]
          args:
            - |
              export PYTHONPATH=/app
              alembic upgrade head
          env:
            - name: APP_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.secrets.dbUser }}:{{ .Values.secrets.dbPassword }}@postgres-service:{{ .Values.postgres.port }}/{{ .Values.secrets.dbName }}"
            - name: REDIS_URL
              value: "redis://redis-service:{{ .Values.redis.port }}/0"
            - name: JWT_SECRET
              value: {{ .Values.secrets.jwtSecret | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.app.llmProvider | quote }}
            - name: AzURE_OPENAI_API_KEY
              value: {{ .Values.secrets.azureOpenAIKey | quote }}
            - name: AZURE_OPENAI_ENDPOINT
              value: {{ .Values.secrets.azureOpenAIEndpoint | quote }}
            - name: AZURE_OPENAI_DEPLOYMENT_NAME
              value: {{ .Values.secrets.azureOpenAIDeploymentName | quote }}
            - name: AZURE_OPENAI_API_VERSION
              value: {{ .Values.secrets.azureOpenAIAPIVersion | quote }}
            - name: AZURE_OPENAI_MODEL
              value: {{ .Values.secrets.azureOpenAIModel | quote }}
            - name: SYNC_DATABASE_URL
              value: "postgresql+psycopg2://{{ .Values.secrets.dbUser }}:{{ .Values.secrets.dbPassword }}@postgres-service:{{ .Values.postgres.port }}/{{ .Values.secrets.dbName }}"
            # - name: GOOGLE_API_KEY
            #   value: "your-google-api-key"
            # - name: GROQ_API_KEY
            #   value: "your-groq-api-key"
            # - name: GROQ_MODEL
            #   value: "your-groq-model"
            # - name: GROQ_BASE_URL
            #   value: "your-groq-base-url"
            # - name: AZURE_AI_ENDPOINT
            #   value: "your-azure-ai-endpoint"
            # - name: AZURE_AI_API_KEY
            #   value: "your-azure-ai-api-key"
            # - name: AZURE_AI_MODEL
            #   value: "your-azure-ai-model"
            # - name: AZURE_AI_API_VERSION
            #   value: "your-azure-ai-api-version"
            # - name: AZURE_AI_CHAT_PATH
            #   value: "your-azure-ai-chat-path"
            # - name: AZURE_OPENAI_ENDPOINT
            #   value: "your-azure-openai-endpoint"
            # - name: AZURE_OPENAI_API_KEY
            #   value: "your-azure-openai-api-key"
            # - name: AZURE_OPENAI_DEPLOYMENT
            #   value: "your-azure-openai-deployment"
            # - name: AZURE_OPENAI_API_VERSION
            #   value: "your-azure-openai-api-version"   
            - name: CORS_ORIGINS
              value: "*"
