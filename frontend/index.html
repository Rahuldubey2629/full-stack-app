<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .status {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .status.online {
            color: #4CAF50;
        }
        
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        button {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .tasks-list {
            list-style: none;
        }
        
        .task-item {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .task-meta {
            font-size: 12px;
            color: #999;
        }
        
        .task-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 10px;
        }
        
        .status-new {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-in_progress {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .status-done {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .task-actions {
            display: flex;
            gap: 5px;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            background: #ff9800;
        }
        
        .btn-small:hover {
            background: #e68900;
        }
        
        .btn-delete {
            background: #f44336;
        }
        
        .btn-delete:hover {
            background: #d32f2f;
        }
        
        .empty {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Task Manager</h1>
        <p class="status" id="status">Checking connection...</p>
        
        <div class="error" id="error"></div>
        
        <div class="form-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>
        
        <div id="loading" class="loading" style="display:none;">Loading tasks...</div>
        <ul class="tasks-list" id="tasksList">
            <li class="empty">No tasks yet. Create one to get started!</li>
        </ul>
    </div>

    <script>
        const API_BASE = '/api';
        
        // Check API connection
        async function checkConnection() {
            try {
                const response = await fetch(`${API_BASE}/health/live`);
                const data = await response.json();
                const statusEl = document.getElementById('status');
                statusEl.textContent = '🟢 Connected to API';
                statusEl.classList.add('online');
                loadTasks();
            } catch (error) {
                const statusEl = document.getElementById('status');
                statusEl.textContent = '🔴 Failed to connect to API';
                statusEl.classList.remove('online');
                showError('Cannot connect to API. Check if backend is running.');
            }
        }
        
        // Load all tasks
        async function loadTasks() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE}/tasks/`);
                if (!response.ok) throw new Error('Failed to fetch tasks');
                
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                showError('Failed to load tasks: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // Render tasks list
        function renderTasks(tasks) {
            const tasksList = document.getElementById('tasksList');
            
            if (tasks.length === 0) {
                tasksList.innerHTML = '<li class="empty">No tasks yet. Create one to get started!</li>';
                return;
            }
            
            tasksList.innerHTML = tasks.map(task => `
                <li class="task-item">
                    <div class="task-info">
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        <div class="task-meta">
                            <span class="task-status status-${task.status}">${task.status}</span>
                            by ${escapeHtml(task.owner)} • ${new Date(task.created_at).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn-small" onclick="updateStatus(${task.id}, '${getNextStatus(task.status)}')">
                            ${getNextStatusLabel(task.status)}
                        </button>
                        <button class="btn-small btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </li>
            `).join('');
        }
        
        // Add new task
        async function addTask() {
            const input = document.getElementById('taskInput');
            const title = input.value.trim();
            
            if (!title) {
                showError('Please enter a task title');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/tasks/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        owner: 'User',
                        status: 'new',
                        notes: ''
                    })
                });
                
                if (!response.ok) throw new Error('Failed to create task');
                
                input.value = '';
                loadTasks();
            } catch (error) {
                showError('Failed to add task: ' + error.message);
            }
        }
        
        // Update task status
        async function updateStatus(taskId, newStatus) {
            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}/`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (!response.ok) throw new Error('Failed to update task');
                loadTasks();
            } catch (error) {
                showError('Failed to update task: ' + error.message);
            }
        }
        
        // Delete task
        async function deleteTask(taskId) {
            if (!confirm('Are you sure?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}/`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('Failed to delete task');
                loadTasks();
            } catch (error) {
                showError('Failed to delete task: ' + error.message);
            }
        }
        
        // Helper functions
        function getNextStatus(status) {
            const workflow = { new: 'in_progress', in_progress: 'done', done: 'new' };
            return workflow[status] || 'new';
        }
        
        function getNextStatusLabel(status) {
            const labels = { new: '▶ Start', in_progress: '✓ Done', done: '↻ New' };
            return labels[status] || 'Start';
        }
        
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
        }
        
        // Initialize on load
        window.addEventListener('load', checkConnection);
    </script>
</body>
</html>
