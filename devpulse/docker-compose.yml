# /devpulse/docker-compose.yml
# TODO: Replace docker-compose with Kubernetes manifests (Deployment/Service/Ingress + Key Vault CSI).

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
      POSTGRES_DB: devpulse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse -d devpulse"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://devpulse:devpulse@postgres:5432/devpulse
      SYNC_DATABASE_URL: postgresql+psycopg2://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: devpulse-dev-secret
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
      AZURE_AI_API_KEY: ${AZURE_AI_API_KEY:-}
      AZURE_AI_MODEL: ${AZURE_AI_MODEL:-}
      AZURE_AI_API_VERSION: ${AZURE_AI_API_VERSION:-}
      AZURE_AI_CHAT_PATH: ${AZURE_AI_CHAT_PATH:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    command:
      - sh
      - -lc
      - |
          export PYTHONPATH=/app
          python - <<'PY'
          import socket
          import sys
          import time

          host = "postgres"
          port = 5432
          deadline = time.time() + 60
          while True:
              try:
                  socket.create_connection((host, port), 2).close()
                  break
              except OSError:
                  if time.time() > deadline:
                      sys.exit("Postgres not ready")
                  time.sleep(1)
          PY
          alembic upgrade head
          uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://devpulse:devpulse@postgres:5432/devpulse
      SYNC_DATABASE_URL: postgresql+psycopg2://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: devpulse-dev-secret
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
      AZURE_AI_API_KEY: ${AZURE_AI_API_KEY:-}
      AZURE_AI_MODEL: ${AZURE_AI_MODEL:-}
      AZURE_AI_API_VERSION: ${AZURE_AI_API_VERSION:-}
      AZURE_AI_CHAT_PATH: ${AZURE_AI_CHAT_PATH:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
    depends_on:
      - backend
      - redis
    command: ["celery", "-A", "app.workers.tasks.celery_app", "worker", "--loglevel=INFO"]

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  pgdata:
